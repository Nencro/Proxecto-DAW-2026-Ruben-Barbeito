services:
  mysql:
    image: mysql:8.4
    container_name: exploramas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-exploramas}
      MYSQL_USER: ${MYSQL_USER:-daw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-daw123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - exploramas_mysql_data:/var/lib/mysql
      - ../src/back/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/back.Dockerfile
    container_name: exploramas-back
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-exploramas}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-daw}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-daw123}
      JWT_SECRET: ${JWT_SECRET:-change-me-with-at-least-32-characters}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      DUFFEL_API_BASE_URL: ${DUFFEL_API_BASE_URL:-https://api.duffel.com}
      DUFFEL_TOKEN: ${DUFFEL_TOKEN:-}
      DUFFEL_VERSION: ${DUFFEL_VERSION:-v2}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  frontend:
    build:
      context: ..
      dockerfile: docker/front.Dockerfile
    container_name: exploramas-front
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONT_API_BASE_URL: ${FRONT_API_BASE_URL:-http://localhost:8080/api}
      FRONT_REST_COUNTRIES_URL: ${FRONT_REST_COUNTRIES_URL:-https://restcountries.com/v3.1/all?fields=name,cca2,translations,flag,idd}
    ports:
      - "4200:80"

volumes:
  exploramas_mysql_data:
