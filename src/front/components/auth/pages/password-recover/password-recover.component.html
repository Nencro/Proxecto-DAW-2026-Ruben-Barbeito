<section class="recover-page">
  <form class="recover-card" #formularioRecover="ngForm" (ngSubmit)="recuperar()">
    <div class="recover-heading">
      <h1>Recuperar contraseña</h1>
      <p>Introduce tus datos y una nueva contraseña.</p>
    </div>

    <label class="recover-field" for="userName">
      Nombre de usuario
      <input
        id="userName"
        name="userName"
        type="text"
        minlength="3"
        maxlength="50"
        pattern="[A-Za-z0-9._\-]+"
        title="Solo letras, numeros, puntos, guiones y guiones bajos."
        [(ngModel)]="userName"
        required
      />
    </label>

    <label class="recover-field" for="email">
      Email
      <input id="email" name="email" type="email" autocomplete="email" [(ngModel)]="email" required />
    </label>

    <label class="recover-field" for="newPassword">
      Nueva contraseña
      <input
        id="newPassword"
        name="newPassword"
        type="password"
        minlength="6"
        maxlength="100"
        pattern="^(?=.*[A-Za-z])(?=.*\d).{6,100}$"
        title="La contraseña debe tener entre 6 y 100 caracteres e incluir al menos una letra y un número."
        [(ngModel)]="newPassword"
        required
      />
    </label>

    <label class="recover-field" for="repeatPassword">
      Repetir nueva contraseña
      <input
        id="repeatPassword"
        name="repeatPassword"
        type="password"
        minlength="6"
        maxlength="100"
        pattern="^(?=.*[A-Za-z])(?=.*\d).{6,100}$"
        title="La contraseña debe tener entre 6 y 100 caracteres e incluir al menos una letra y un número."
        [(ngModel)]="repeatPassword"
        [class.field-invalid]="passwordsNoCoinciden"
        [attr.aria-invalid]="passwordsNoCoinciden ? 'true' : null"
        [attr.aria-describedby]="passwordsNoCoinciden ? 'repeatPasswordError' : null"
        required
      />
    </label>

    @if (mensajeError) {
      <p id="repeatPasswordError" class="recover-error">{{ mensajeError }}</p>
    }

    @if (mensajeExito) {
      <p class="recover-success">{{ mensajeExito }}</p>
    }

    <button class="app-button app-button--primary" type="submit" [disabled]="formularioRecover.invalid || passwordsNoCoinciden || enviando">
      {{ enviando ? 'Guardando...' : 'Cambiar contraseña' }}
    </button>

    <a class="back-link" routerLink="/login">Volver al login</a>
  </form>
</section>
