<section class="travel-join-page">
  <h1 class="offscreen-empty-heading">Unirse a viaje</h1>
  @if (cargando) {
    <div class="join-panel">
      <app-loading-spinner label="Uniendote al viaje"></app-loading-spinner>
    </div>
  } @else if (error) {
    <div class="join-panel join-panel--error">
      <p>{{ error }}</p>
      <a class="app-button" routerLink="/travels">Volver a mis viajes</a>
    </div>
  }
</section>
