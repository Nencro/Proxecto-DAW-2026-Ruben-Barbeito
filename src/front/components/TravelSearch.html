<div class="travel-search-container">
  <h2 class="search-title">Encuentra tu próximo viaje</h2>
  
  <form (ngSubmit)="handleSubmit()" #travelForm="ngForm" class="travel-search-bar">
    <div class="search-field">
      <label for="destination">Destino</label>
      <input
        type="text"
        id="destination"
        name="destination"
        placeholder="¿A dónde vas?"
        [(ngModel)]="searchData.destination"
        required
      />
    </div>
    
    <div class="field-divider"></div>
    
    <div class="search-field">
      <label for="startDate">Ida</label>
      <input type="date" id="startDate" name="startDate" [(ngModel)]="searchData.startDate" required />
    </div>

    <div class="field-divider"></div>

    <div class="search-field">
      <label for="endDate">Vuelta</label>
      <input type="date" id="endDate" name="endDate" [(ngModel)]="searchData.endDate" required />
    </div>

    <div class="field-divider"></div>

    <div class="search-field">
      <label for="travelers">Viajeros</label>
      <input
        type="number"
        id="travelers"
        name="travelers"
        min="1"
        [(ngModel)]="searchData.travelers"
        required
      />
    </div>

    <button type="submit" class="search-button" [disabled]="!travelForm.valid">
      Buscar
    </button>
  </form>
</div>
