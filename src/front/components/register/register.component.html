<section class="register-page">
  <form class="register-form" (ngSubmit)="handleSubmit()" #formularioRegistro="ngForm">
    <div class="register-heading">
      <h1>Registro</h1>
      <p>Crea tu cuenta de ExploraMas.</p>
    </div>

    <label class="register-field" for="usuario">
      Usuario
      <input
        id="usuario"
        type="text"
        name="usuario"
        autocomplete="username"
        placeholder="Rbarbeito"
        [(ngModel)]="usuario"
        (ngModelChange)="limpiarErrorUsuario()"
        [class.field-invalid]="errorUsuario"
        [attr.aria-invalid]="errorUsuario ? 'true' : null"
        [attr.aria-describedby]="errorUsuario ? 'usuarioError' : null"
        minlength="3"
        maxlength="50"
        pattern="[A-Za-z0-9._-]+"
        title="Solo letras, numeros, puntos, guiones y guiones bajos."
        required
      />
      @if (errorUsuario) {
        <span id="usuarioError" class="field-error">{{ errorUsuario }}</span>
      }
    </label>

    <label class="register-field" for="email">
      Correo electronico
      <input
        id="email"
        type="email"
        name="email"
        autocomplete="email"
        placeholder="correo-1@host.com"
        [(ngModel)]="email"
        (ngModelChange)="limpiarErrorEmail()"
        [class.field-invalid]="errorEmail"
        [attr.aria-invalid]="errorEmail ? 'true' : null"
        [attr.aria-describedby]="errorEmail ? 'emailError' : null"
        maxlength="190"
        required
      />
      @if (errorEmail) {
        <span id="emailError" class="field-error">{{ errorEmail }}</span>
      }
    </label>

    <label class="register-field" for="password">
      Contrasena
      <input
        id="password"
        type="password"
        name="password"
        autocomplete="new-password"
        placeholder="Contrasena"
        [(ngModel)]="password"
        (ngModelChange)="limpiarErrorPassword()"
        [class.field-invalid]="errorPassword"
        [attr.aria-invalid]="errorPassword ? 'true' : null"
        [attr.aria-describedby]="errorPassword ? 'passwordError' : null"
        minlength="6"
        maxlength="100"
        pattern="^(?=.*[A-Za-z])(?=.*\\d).{6,100}$"
        title="La contrasena debe tener entre 6 y 100 caracteres e incluir al menos una letra y un numero."
        required
      />
      @if (errorPassword) {
        <span id="passwordError" class="field-error">{{ errorPassword }}</span>
      }
    </label>

    <label class="register-field" for="confirmarPassword">
      Confirmar Contrasena
      <input
        id="confirmarPassword"
        type="password"
        name="confirmarPassword"
        autocomplete="new-password"
        placeholder="Contrasena"
        [(ngModel)]="confirmarPassword"
        (ngModelChange)="limpiarErrorPassword()"
        [class.field-invalid]="errorConfirmarPassword"
        [attr.aria-invalid]="errorConfirmarPassword ? 'true' : null"
        [attr.aria-describedby]="errorConfirmarPassword ? 'confirmarPasswordError' : null"
        minlength="6"
        maxlength="100"
        pattern="^(?=.*[A-Za-z])(?=.*\\d).{6,100}$"
        title="La contrasena debe tener entre 6 y 100 caracteres e incluir al menos una letra y un numero."
        required
      />
      @if (errorConfirmarPassword) {
        <span id="confirmarPasswordError" class="field-error">{{ errorConfirmarPassword }}</span>
      }
    </label>

    @if (passwordNoCoincide && !errorConfirmarPassword) {
      <p class="register-error">Las contrasenas no coinciden.</p>
    }

    @if (mensajeError && !errorUsuario && !errorEmail) {
      <p class="register-error">{{ mensajeError }}</p>
    }

    <div class="register-actions">
      <a class="register-button app-button app-button--secondary" routerLink="/">Salir</a>
      <button class="register-button app-button app-button--primary" type="submit" [disabled]="enviando">
        {{ enviando ? 'Registrando...' : 'Confirmar' }}
      </button>
    </div>
  </form>
</section>
