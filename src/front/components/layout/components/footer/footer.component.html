<footer class="app-footer">
  <div class="footer-content">
    <div class="footer-company">
      <a class="footer-brand" routerLink="/" aria-label="ExploraMas inicio">
        <img class="footer-logo" src="assets/logo_exploramas.png" alt="ExploraMas" />
      </a>
    </div>

    <nav class="footer-section" aria-label="ExploraMas">
      <h2>
        <button
          type="button"
          class="footer-section-toggle"
          aria-controls="footerExploramas"
          [attr.aria-expanded]="seccionEstaAbierta('exploramas')"
          (click)="alternarSeccion('exploramas')"
        >
          ExploraMas
        </button>
      </h2>
      <div
        id="footerExploramas"
        class="footer-section-content"
        [class.footer-section-content--open]="seccionEstaAbierta('exploramas')"
      >
        <a [routerLink]="autenticado ? '/travels' : '/'">Buscar viajes</a>
        @if (autenticado) {
          <a routerLink="/profile">Mi perfil</a>
        } @else {
          <a routerLink="/login">Login</a>
        }
      </div>
    </nav>

    <nav class="footer-section" aria-label="Ayuda">
      <h2>
        <button
          type="button"
          class="footer-section-toggle"
          aria-controls="footerHelp"
          [attr.aria-expanded]="seccionEstaAbierta('ayuda')"
          (click)="alternarSeccion('ayuda')"
        >
          Ayuda
        </button>
      </h2>
      <div
        id="footerHelp"
        class="footer-section-content"
        [class.footer-section-content--open]="seccionEstaAbierta('ayuda')"
      >
        <a routerLink="/help">Centro de ayuda</a>
        <a routerLink="/contact">Contacto</a>
        <a routerLink="/faq">Preguntas frecuentes</a>
      </div>
    </nav>

    <nav class="footer-section" aria-label="Legal">
      <h2>
        <button
          type="button"
          class="footer-section-toggle"
          aria-controls="footerLegal"
          [attr.aria-expanded]="seccionEstaAbierta('legal')"
          (click)="alternarSeccion('legal')"
        >
          Legal
        </button>
      </h2>
      <div
        id="footerLegal"
        class="footer-section-content"
        [class.footer-section-content--open]="seccionEstaAbierta('legal')"
      >
        <a routerLink="/aviso-legal">Aviso legal</a>
        <a routerLink="/cookies">Cookies</a>
        <a routerLink="/condiciones">Condiciones</a>
      </div>
    </nav>

    <div class="footer-section">
      <h2>
        <button
          type="button"
          class="footer-section-toggle"
          aria-controls="footerSocial"
          [attr.aria-expanded]="seccionEstaAbierta('social')"
          (click)="alternarSeccion('social')"
        >
          Siguenos
        </button>
      </h2>

      <div
        id="footerSocial"
        class="footer-section-content"
        [class.footer-section-content--open]="seccionEstaAbierta('social')"
      >
        <nav class="footer-social" aria-label="Redes sociales">
          <a
            class="social-link social-link--facebook"
            href="https://www.facebook.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Facebook"
          >
            <img src="assets/facebook.png" alt="" aria-hidden="true" />
          </a>
          <a
            class="social-link social-link--x"
            href="https://x.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="X"
          >
            <img src="assets/x.png" alt="" aria-hidden="true" />
          </a>
        </nav>

        <a class="footer-email" href="mailto:info@exploramas.com">info&#64;exploramas.com</a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 ExploraMas. Todos los derechos reservados.</p>
    <div class="footer-bottom-links">
      <a routerLink="/">Mapa del sitio</a>
      <a routerLink="/help">Accesibilidad</a>
      <a routerLink="/cookies">Preferencias de cookies</a>
    </div>
  </div>
</footer>
